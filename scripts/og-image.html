<!doctype html>
<!--
  Source template for public/og-image.png (the social-share preview).
  Lives in scripts/ (not public/) so only the rendered PNG ships in the build.
  Edit this, then re-render with:
    npm run og   (or: node scripts/render-og.mjs)
  Renders this file to public/og-image.png at 1200x630 via headless Chrome.
-->
<html lang="he">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1200px; height: 630px; }
      body {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 80px 96px;
        font-family: "Segoe UI", "Noto Sans Hebrew", system-ui, sans-serif;
        background: radial-gradient(circle at 30% 20%, #b3243b 0%, #7a0f24 55%, #4a0716 100%);
        color: #fff7ec;
        direction: rtl;
        overflow: hidden;
      }
      .text { display: flex; flex-direction: column; gap: 28px; max-width: 620px; }
      .title { font-size: 116px; font-weight: 800; line-height: 1; letter-spacing: -1px; }
      .subtitle { font-size: 40px; font-weight: 500; color: #ffd9a0; line-height: 1.3; }
      .tags { display: flex; gap: 18px; margin-top: 12px; }
      .tag {
        font-size: 30px; font-weight: 600;
        padding: 12px 26px; border-radius: 999px;
        background: rgba(255, 247, 236, 0.12);
        border: 2px solid rgba(255, 217, 160, 0.5);
      }
      .hanzi {
        font-size: 430px; font-weight: 700; line-height: 1;
        font-family: "Microsoft YaHei", "Noto Sans SC", "SimSun", sans-serif;
        color: #fff7ec;
        text-shadow: 0 14px 60px rgba(0, 0, 0, 0.4);
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="text">
      <div class="title">לימוד סינית</div>
      <div class="subtitle">אוצר מילים בסינית לדוברי עברית</div>
      <div class="tags">
        <span class="tag">汉字</span>
        <span class="tag">Pīnyīn</span>
        <span class="tag">עברית</span>
      </div>
    </div>
    <div class="hanzi">汉</div>
  </body>
</html>
